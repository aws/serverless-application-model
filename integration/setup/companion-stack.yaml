Parameters:
  CreateMskCluster:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  CreateMqBroker:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

Conditions:
  ShouldCreateMsk:
    Fn::Equals: [!Ref CreateMskCluster, 'true']
  ShouldCreateMq:
    Fn::Equals: [!Ref CreateMqBroker, 'true']
  HasNewMqInstanceTypes:
    Fn::Equals: [!Ref "AWS::Region", ap-southeast-6]

Resources:
  PreCreatedVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16

  PreCreatedSubnetOne:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: PreCreatedVpc
      CidrBlock: 10.0.0.0/24
      AvailabilityZone:
        Fn::Select:
        - 0
        - Fn::GetAZs: ''

  PreCreatedSubnetTwo:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: PreCreatedVpc
      CidrBlock: 10.0.1.0/24
      AvailabilityZone:
        Fn::Select:
        - 1
        - Fn::GetAZs: ''

  PreCreatedInternetGateway:
    Type: AWS::EC2::InternetGateway

  PreCreatedAttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId:
        Ref: PreCreatedVpc
      InternetGatewayId:
        Ref: PreCreatedInternetGateway

  PreCreatedS3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete

  LMIKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS Key for Lambda Capacity Provider Resource
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
        - Sid: Enable IAM User Permissions
          Effect: Allow
          Principal:
            AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
          Action: kms:*
          Resource: '*'
        - Sid: Allow Lambda service
          Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action:
          - kms:Decrypt
          - kms:DescribeKey
          Resource: '*'    # Lambda Managed Instances (LMI) VPC Resources

  LMIVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
      - Key: Name
        Value: !Sub "${AWS::StackName}-VPC"

  LMIPrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LMIVpc
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
      - Key: Name
        Value: !Sub "${AWS::StackName}-PrivateSubnet"

  LMIPrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref LMIVpc
      Tags:
      - Key: Name
        Value: !Sub "${AWS::StackName}-PrivateRT"

  LMIPrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref LMIPrivateSubnet
      RouteTableId: !Ref LMIPrivateRouteTable

  LMISecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for capacity provider Lambda functions
      VpcId: !Ref LMIVpc
      SecurityGroupEgress:
      - IpProtocol: tcp
        FromPort: 443
        ToPort: 443
        CidrIp: 10.0.0.0/16
        Description: Allow HTTPS within VPC
      Tags:
      - Key: Name
        Value: !Sub "${AWS::StackName}-LambdaSG"

  VPCEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for VPC endpoints
      VpcId: !Ref LMIVpc
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 443
        ToPort: 443
        CidrIp: 10.0.0.0/16
        Description: Allow HTTPS from within VPC
      Tags:
      - Key: Name
        Value: !Sub "${AWS::StackName}-VPCEndpointSG"

  CloudWatchLogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref LMIVpc
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.logs'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
      - !Ref LMIPrivateSubnet
      SecurityGroupIds:
      - !Ref VPCEndpointSecurityGroup
      Tags:
      - Key: Name
        Value: !Sub "${AWS::StackName}-CloudWatchLogsEndpoint"

  PreCreatedMskCluster:
    Type: AWS::MSK::Cluster
    Condition: ShouldCreateMsk
    Properties:
      BrokerNodeGroupInfo:
        ClientSubnets:
        - !Ref PreCreatedSubnetOne
        - !Ref PreCreatedSubnetTwo
        InstanceType: kafka.t3.small
        StorageInfo:
          EBSStorageInfo:
            VolumeSize: 1
      ClusterName: !Sub "${AWS::StackName}-msk"
      KafkaVersion: 3.8.x
      NumberOfBrokerNodes: 2

  MQRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: ShouldCreateMq
    Properties:
      VpcId: !Ref PreCreatedVpc

  MQRoute:
    Type: AWS::EC2::Route
    Condition: ShouldCreateMq
    Properties:
      RouteTableId: !Ref MQRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref PreCreatedInternetGateway

  MQSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: ShouldCreateMq
    Properties:
      SubnetId: !Ref PreCreatedSubnetOne
      RouteTableId: !Ref MQRouteTable

  MQSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: ShouldCreateMq
    Properties:
      GroupDescription: Security group for Amazon MQ broker
      VpcId: !Ref PreCreatedVpc
      SecurityGroupIngress:
      - {IpProtocol: tcp, FromPort: 8162, ToPort: 8162, CidrIp: 10.0.0.0/16}
      - {IpProtocol: tcp, FromPort: 61617, ToPort: 61617, CidrIp: 10.0.0.0/16}
      - {IpProtocol: tcp, FromPort: 5671, ToPort: 5671, CidrIp: 10.0.0.0/16}
      - {IpProtocol: tcp, FromPort: 61614, ToPort: 61614, CidrIp: 10.0.0.0/16}
      - {IpProtocol: tcp, FromPort: 8883, ToPort: 8883, CidrIp: 10.0.0.0/16}

  PreCreatedMqBroker:
    Type: AWS::AmazonMQ::Broker
    Condition: ShouldCreateMq
    Properties:
      BrokerName: !Sub "${AWS::StackName}-mq"
      DeploymentMode: SINGLE_INSTANCE
      EngineType: ACTIVEMQ
      EngineVersion: '5.18'
      HostInstanceType: !If [HasNewMqInstanceTypes, mq.m7i.large, mq.t3.micro]
      Logs: {Audit: true, General: true}
      PubliclyAccessible: true
      AutoMinorVersionUpgrade: true
      SecurityGroups: [!Ref MQSecurityGroup]
      SubnetIds: [!Ref PreCreatedSubnetOne]
      Users:
      - ConsoleAccess: true
        Groups: [admin]
        Username: testBrokerUser
        Password: testBrokerPassword

  PreCreatedMqBrokerSecret:
    Type: AWS::SecretsManager::Secret
    Condition: ShouldCreateMq
    Properties:
      Name: !Sub "${AWS::StackName}-mq-secret"
      SecretString: '{"username":"testBrokerUser","password":"testBrokerPassword"}'
      Description: SecretsManager Secret for pre-created MQ broker

  ApiGatewayLoggingRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: apigateway.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs"

  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    DependsOn: ApiGatewayLoggingRole
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayLoggingRole.Arn

  TestStackSweeperRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      - !Sub "arn:${AWS::Partition}:iam::aws:policy/ReadOnlyAccess"
      Policies:
      - PolicyName: TestStackSweeperPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - cloudformation:DeleteStack
            - cloudformation:UpdateTerminationProtection
            Resource: !Sub "arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/*sam-integ-stack-*"
          - Effect: Allow
            Action:
            - iam:DeleteRolePolicy
            - iam:DetachRolePolicy
            - iam:DeleteRole
            - iam:DeletePolicyVersion
            - iam:DeletePolicy
            Resource:
            - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/hydra-*"
            - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/sam-integ-stack-*"
            - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/hydra-*"
            - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/sam-integ-stack-*"
          - Effect: Allow
            Action:
            - s3:DeleteObject
            - s3:DeleteObjectVersion
            - s3:DeleteBucket
            Resource:
            - !Sub "arn:${AWS::Partition}:s3:::*sam-integ-stack-*"
            - !Sub "arn:${AWS::Partition}:s3:::*sam-integ-stack-*/*"
          - Effect: Allow
            Action:
            - logs:DeleteLogGroup
            Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*sam-integ-*:*"
          - Effect: Allow
            Action: '*'
            Resource: '*'
            Condition:
              ForAnyValue:StringEquals:
                aws:CalledVia: cloudformation.amazonaws.com

  TestStackSweeperFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-test-stack-sweeper"
      Runtime: python3.10
      Handler: index.handler
      Timeout: 900
      MemorySize: 256
      Role: !GetAtt TestStackSweeperRole.Arn
      Code:
        ZipFile: |
          import boto3, time
          from datetime import datetime, timezone, timedelta

          STACK_PATTERN = 'sam-integ-stack-'
          IAM_PATTERN = 'sam-integ-'
          STATUSES = [
            'CREATE_COMPLETE', 'ROLLBACK_COMPLETE', 'ROLLBACK_FAILED',
            'REVIEW_IN_PROGRESS', 'DELETE_FAILED', 'UPDATE_FAILED',
            'UPDATE_COMPLETE', 'UPDATE_ROLLBACK_COMPLETE',
            'UPDATE_ROLLBACK_FAILED']

          def _has_time(ctx):
            return ctx.get_remaining_time_in_millis() > 30000

          def _is_test(name, strict=False):
            pattern = STACK_PATTERN if strict else IAM_PATTERN
            return pattern in name and 'companion' not in name

          def handler(event, ctx):
            cfn = boto3.client('cloudformation')
            iam = boto3.client('iam')
            logs = boto3.client('logs')
            cutoff = datetime.now(timezone.utc) - timedelta(hours=24)

            _sweep_stacks(cfn, iam, cutoff, ctx)
            _sweep_log_groups(logs, cutoff, ctx)

          def _sweep_stacks(cfn, iam, cutoff, ctx):
            deleted = 0
            for page in cfn.get_paginator('list_stacks').paginate(StackStatusFilter=STATUSES):
              for stack in page['StackSummaries']:
                if not _has_time(ctx):
                  print(f"Deleted: {deleted}")
                  return
                name = stack['StackName']
                if not _is_test(name, strict=True):
                  continue
                if stack['CreationTime'].replace(tzinfo=timezone.utc) >= cutoff:
                  continue
                try:
                  cfn.update_termination_protection(EnableTerminationProtection=False, StackName=name)
                except Exception:
                  pass
                if stack['StackStatus'] == 'DELETE_FAILED':
                  _fix_and_retry(cfn, iam, name)
                try:
                  cfn.delete_stack(StackName=name)
                  deleted += 1
                  time.sleep(1)
                except Exception as e:
                  print(f"delete_stack {name}: {e}")
            print(f"Stacks: {deleted} deleted")

          def _fix_and_retry(cfn, iam, stack_name):
            try:
              for event in cfn.describe_stack_events(StackName=stack_name)['StackEvents']:
                if event.get('ResourceStatus') != 'DELETE_FAILED':
                  continue
                resource_type = event.get('ResourceType', '')
                resource_id = event.get('PhysicalResourceId', '')
                if not resource_id or not _is_test(resource_id):
                  continue
                if resource_type == 'AWS::IAM::Role':
                  _force_delete_role(iam, resource_id)
                elif resource_type == 'AWS::IAM::Policy':
                  _force_delete_policy(iam, resource_id)
                elif resource_type == 'AWS::S3::Bucket':
                  try:
                    bucket = boto3.resource('s3').Bucket(resource_id)
                    bucket.object_versions.delete()
                    bucket.objects.delete()
                  except Exception: pass
            except Exception as e:
              print(f"fix_and_retry {stack_name}: {e}")

          def _force_delete_role(iam, role_name):
            try:
              for p in iam.list_role_policies(RoleName=role_name)['PolicyNames']:
                iam.delete_role_policy(RoleName=role_name, PolicyName=p)
              for p in iam.list_attached_role_policies(RoleName=role_name)['AttachedPolicies']:
                iam.detach_role_policy(RoleName=role_name, PolicyArn=p['PolicyArn'])
              iam.delete_role(RoleName=role_name)
            except Exception: pass

          def _force_delete_policy(iam, arn):
            try:
              for page in iam.get_paginator('list_entities_for_policy').paginate(PolicyArn=arn, EntityFilter='Role'):
                for r in page['PolicyRoles']:
                  iam.detach_role_policy(RoleName=r['RoleName'], PolicyArn=arn)
              for v in iam.list_policy_versions(PolicyArn=arn)['Versions']:
                if not v['IsDefaultVersion']:
                  iam.delete_policy_version(PolicyArn=arn, VersionId=v['VersionId'])
              iam.delete_policy(PolicyArn=arn)
            except Exception: pass

          def _sweep_log_groups(logs, cutoff, ctx):
            cutoff_ms = int(cutoff.timestamp() * 1000)
            deleted = 0
            for page in logs.get_paginator('describe_log_groups').paginate(logGroupNamePrefix='/aws/lambda/'):
              for log_group in page['logGroups']:
                if not _has_time(ctx):
                  return
                name = log_group['logGroupName']
                if STACK_PATTERN not in name:
                  continue
                if log_group.get('creationTime', 0) >= cutoff_ms:
                  continue
                try:
                  logs.delete_log_group(logGroupName=name)
                  deleted += 1
                  time.sleep(1)
                except Exception: pass
            print(f"Log groups: {deleted} deleted")

  TestStackSweeperSchedule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(6 hours)
      State: ENABLED
      Targets:
      - Arn: !GetAtt TestStackSweeperFunction.Arn
        Id: TestStackSweeperTarget

  TestStackSweeperInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt TestStackSweeperFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt TestStackSweeperSchedule.Arn

Outputs:
  PreCreatedVpc:
    Description: Pre-created VPC that can be used inside other tests
    Value:
      Ref: PreCreatedVpc
  PreCreatedSubnetTwo:
    Description: 'Pre-created #2 subnet that can be used inside other tests'
    Value:
      Ref: PreCreatedSubnetTwo
  PreCreatedSubnetOne:
    Description: 'Pre-created #1 subnet that can be used inside other tests'
    Value:
      Ref: PreCreatedSubnetOne
  PreCreatedInternetGateway:
    Description: Pre-created Internet Gateway that can be used inside other tests
    Value:
      Ref: PreCreatedInternetGateway
  PreCreatedAttachGateway:
    Description: Pre-created Attach Gateway that can be used inside other tests
    Value:
      Ref: PreCreatedAttachGateway
  PreCreatedS3Bucket:
    Description: Pre-created S3 Bucket that can be used inside other tests
    Value:
      Ref: PreCreatedS3Bucket
  LMISubnetId:
    Description: Private subnet ID for Lambda functions
    Value: !Ref LMIPrivateSubnet
  LMISecurityGroupId:
    Description: Security group ID for Lambda functions
    Value: !Ref LMISecurityGroup
  LMIKMSKeyArn:
    Description: ARN of the KMS key for Capacity Provider
    Value: !GetAtt LMIKMSKey.Arn
  PreCreatedMskClusterArn:
    Condition: ShouldCreateMsk
    Description: ARN of the pre-created MSK cluster
    Value: !Ref PreCreatedMskCluster
  PreCreatedMqBrokerArn:
    Condition: ShouldCreateMq
    Description: ARN of the pre-created MQ broker
    Value: !GetAtt PreCreatedMqBroker.Arn
  PreCreatedMqBrokerSecretArn:
    Condition: ShouldCreateMq
    Description: ARN of the MQ broker credentials secret
    Value: !Ref PreCreatedMqBrokerSecret
Metadata:
  SamTransformTest: true
