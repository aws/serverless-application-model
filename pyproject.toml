[tool.black]
line-length = 120
target_version = ['py310', 'py311', 'py312', 'py313', 'py314']
exclude = '''

(
  /(
      \.eggs         # exclude a few common directories in the
    | \.git          # root of the project
    | \.tox
    | \.venv
    | build
    | dist
    | pip-wheel-metadata
    | examples
  )/
)
'''
