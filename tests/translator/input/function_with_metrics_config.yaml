Resources:
  FilteredEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://sam-demo-bucket/metricsConfig.zip
      Handler: index.handler
      Runtime: nodejs16.x
      Events:
        KinesisStream:
          Type: Kinesis
          Properties:
            Stream: !GetAtt KinesisStream.Arn
            StartingPosition: LATEST
            MetricsConfig:
              Metrics:
              - EventCount
            FilterCriteria:
              Filters:
              - Pattern: '{"name": "value"}'
              - Pattern: '{"name2": "value2"}'
        DynamoDBStreamEvent:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt DynamoDBTable.StreamArn
            StartingPosition: TRIM_HORIZON
            MetricsConfig:
              Metrics: []
            FilterCriteria:
              Filters: []
        MySqsQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt MySqsQueue.Arn
            MetricsConfig:
              Metrics:
              - EventCount
            FilterCriteria:
              Filters:
              - Pattern: '{"name": "value"}'
        MSKEvent:
          Type: MSK
          Properties:
            Stream: !GetAtt MSKCluster.Arn
            StartingPosition: LATEST
            MetricsConfig:
              Metrics:
              - EventCount
              - ErrorCount
              - KafkaMetrics
            Topics:
            - my-topic
        SelfManagedKafkaEvent:
          Type: SelfManagedKafka
          Properties:
            KafkaBootstrapServers:
            - broker1:9092
            - broker2:9092
            Topics:
            - my-topic
            SourceAccessConfigurations:
            - Type: SASL_SCRAM_256_AUTH
              URI: !Ref KafkaSecret
            MetricsConfig:
              Metrics:
              - ErrorCount
              - KafkaMetrics

  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: 1

  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      BillingMode: PAY_PER_REQUEST
      KeySchema:
      - AttributeName: id
        KeyType: HASH

  MySqsQueue:
    Type: AWS::SQS::Queue

  MSKCluster:
    Type: AWS::MSK::Cluster
    Properties:
      ClusterName: test-cluster
      KafkaVersion: 2.8.0
      NumberOfBrokerNodes: 2
      BrokerNodeGroupInfo:
        InstanceType: kafka.t3.small
        ClientSubnets:
        - subnet-12345
        - subnet-67890

  KafkaSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Kafka SASL credentials
      SecretString: !Sub |
        {
          "username": "kafka-user",
          "password": "kafka-password"
        }
