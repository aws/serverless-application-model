Resources:
  Func:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: python3.14
      Handler: index.handler
      CodeUri: s3://bucket/key
  WSApi:
    Type: AWS::Serverless::WebSocketApi
    Properties:
      IpAddressType: nonsense
      Name: WSApi
      Routes:
        $default:
          FunctionArn: !GetAtt Func.Arn
      RouteSelectionExpression: $request.body.action
