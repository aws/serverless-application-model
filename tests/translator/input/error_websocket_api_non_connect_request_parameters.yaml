Resources:
  Func:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: python3.14
      Handler: index.handler
      CodeUri: s3://bucket/key
  WSApi:
    Type: AWS::Serverless::WebSocketApi
    Properties:
      Name: WSApi
      Routes:
        $default:
          FunctionArn: !GetAtt Func.Arn
          RequestParameters:
            route.request.querystring.p1:
              Required: true
      RouteSelectionExpression: $request.body.action
