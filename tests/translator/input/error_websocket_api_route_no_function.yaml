Resources:
  Func:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: python3.14
      Handler: index.handler
      CodeUri: s3://bucket/key
  WSApi:
    Type: AWS::Serverless::WebSocketApi
    Properties:
      Name: WSApi
      Routes:
        $connect:
          IntegrationTimeout: 15000
      RouteSelectionExpression: $request.body.action
