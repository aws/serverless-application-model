Globals:
  WebSocketApi:
    Domain:
      DomainName: admin.one.amazon.com
      CertificateArn: arn:aws:acm:us-east-1:123456789012:certificate/abc
      EndpointConfiguration: REGIONAL
      Route53:
        HostedZoneId: abc123456

Resources:
  Connect1:
    Type: AWS::Serverless::Function
    Properties:
      InlineCode: '# placeholder'
      Handler: hello.handler
      Runtime: nodejs20.x
  Connect2:
    Type: AWS::Serverless::Function
    Properties:
      InlineCode: '# placeholder'
      Handler: hello.handler
      Runtime: nodejs20.x
  Api1:
    Type: AWS::Serverless::WebSocketApi
    Properties:
      Name: Api1
      Routes:
        $connect:
          FunctionArn: !GetAtt Connect1.Arn
      RouteSelectionExpression: $request.body.action
  Api2:
    Type: AWS::Serverless::WebSocketApi
    Properties:
      Domain:
        DomainName: admin.two.amazon.com
        CertificateArn: arn:aws:acm:us-east-1:123456789012:certificate/abc
        EndpointConfiguration: REGIONAL
        Route53:
          HostedZoneId: abc123456
      Name: Api2
      Routes:
        $connect:
          FunctionArn: !GetAtt Connect2.Arn
      RouteSelectionExpression: $request.body.action
