Globals:
  Api:
    EndpointAccessMode: BASIC
    SecurityPolicy: SecurityPolicy_TLS13_1_3_2025_09

Resources:
  # Inherits Globals
  ApiInheritGlobals:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod

  # Top-level overrides Globals
  ApiTopLevelOverride:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      EndpointAccessMode: STRICT
      SecurityPolicy: SecurityPolicy_TLS13_1_3_2025_09
