AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CapacityProvider with intrinsic functions test

Parameters:
  CapacityProviderName:
    Type: String
    Default: intrinsic-capacity-provider

  SecurityGroupId:
    Type: String
    Default: sg-0a1e1457229da0f74

  SubnetId:
    Type: String
    Default: subnet-01e6344879fd06036

  Architecture:
    Type: String
    Default: arm64

  AllowedInstanceType:
    Type: String
    Default: c5.xlarge

  ExcludedInstanceTypeList:
    Type: List<String>
    Default: t2.micro,c5.xlarge

  SecurityGroupIdList:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Default: sg-0a1e1457229da0f74,sg-3b1f1457229da0f92

  SubnetIdList:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-01e6344879fd06036,subnet-0136378879fd07039

  ArchitecturesList:
    Type: List<String>
    Default: x86_64

  MaxVCpuCount:
    Type: Number
    Default: 10

  TargetCPU:
    Type: Number
    Default: 75.0

  TargetMemory:
    Type: Number
    Default: 81.2

  KmsKeyArn:
    Type: String
    Default: arn:aws:kms:us-east-1:123456789012:key/abcd1234-ef56-gh78-ij90-klmnopqrstuv

Resources:
  IntrinsicCapacityProvider:
    Type: AWS::Serverless::CapacityProvider
    Properties:
      CapacityProviderName: !Ref CapacityProviderName
      VpcConfig:
        SecurityGroupIds:
        - !Ref SecurityGroupId
        SubnetIds:
        - !Ref SubnetId
      Tags:
        Environment: !Sub "${AWS::StackName}-environment"
        Team: !Sub "${AWS::StackName}-team"
      InstanceRequirements:
        Architectures:
        - !Ref Architecture
        AllowedTypes:
        - !Ref AllowedInstanceType
        - !Join [., [c5, 2xlarge]]
        - c5.large
      ScalingConfig:
        MaxVCpuCount: !Ref MaxVCpuCount
        AverageCPUUtilization: !Ref TargetCPU
      KmsKeyArn: !Ref KmsKeyArn

  IntrinsicCapacityProviderTwo:
    Type: AWS::Serverless::CapacityProvider
    Properties:
      VpcConfig:
        SecurityGroupIds: !Ref SecurityGroupIdList
        SubnetIds: !Ref SubnetIdList
      InstanceRequirements:
        Architectures: !Ref ArchitecturesList
        ExcludedTypes: !Ref ExcludedInstanceTypeList
      ScalingConfig:
        MaxVCpuCount: !Ref MaxVCpuCount
        AverageCPUUtilization: !Ref TargetCPU
      KmsKeyArn: !Ref KmsKeyArn
