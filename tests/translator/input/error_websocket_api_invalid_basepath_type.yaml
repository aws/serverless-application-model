Resources:
  Func:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: python3.14
      Handler: index.handler
      CodeUri: s3://bucket/key
  WSApi:
    Type: AWS::Serverless::WebSocketApi
    Properties:
      Name: WSApi
      Domain:
        DomainName: domain-name
        CertificateArn:
          Ref: CertificateArn
        BasePath:
        - Fn::Sub: /${BasePathId}
      Routes:
        $default:
          FunctionArn: !GetAtt default.Arn
      RouteSelectionExpression: $request.body.action
