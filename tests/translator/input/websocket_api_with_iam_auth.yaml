Resources:
  ConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      InlineCode: '# placeholder'
      Handler: hello.handler
      Runtime: nodejs20.x
  MyApi:
    Type: AWS::Serverless::WebSocketApi
    Properties:
      Name: MyApi
      Auth:
        AuthType: AWS_IAM
      Routes:
        $connect:
          FunctionArn: !GetAtt ConnectFunction.Arn
      RouteSelectionExpression: $request.body.action
  RootRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service:
            - ec2.amazonaws.com
          Action:
          - sts:AssumeRole
      Path: /
      Policies:
      - PolicyName: root
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: '*'
            Resource: '*'
  RootInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
      - !Ref RootRole
